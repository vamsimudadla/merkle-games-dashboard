version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gamedb-app
    environment:
      - NODE_ENV=development
      - PORT=${PORT:-8000}
      - DB_STORAGE=/app/data/gamedb.sqlite
      - JWT_SECRET=your-secret-key-here-change-in-production
      - API_VERSION=v1
      - API_PREFIX=/api
      - GRAPHQL_PATH=/graphql
      - GRAPHQL_PLAYGROUND=true
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
    volumes:
      - ./src:/app/src
      - ./seeders:/app/seeders
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -f http://localhost:$${PORT:-8000}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
